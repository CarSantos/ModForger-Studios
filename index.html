<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (!desc) {
            desc = Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          }
          if (desc && !desc.set) {
            var originalFetch = desc.value || window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Ignored fetch override'); },
              configurable: true,
              enumerable: desc.enumerable
            });
          }
        } catch (e) {
            console.warn(e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
